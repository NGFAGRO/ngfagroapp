<html lang="bn">

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700;800&family=Hind+Siliguri:wght@400;500;600;700&display=swap');
:root{
  --wheat:#b5710f; --wheat-deep:#8a5608; --wheat-soft:#faf1de;
  --forest:#1b5940; --forest-deep:#123d2b; --forest-soft:#e5f1eb;
  --clay:#ae3b28; --clay-soft:#fbeae6;
  --indigo:#2c4a80; --indigo-soft:#e8edf7;
  --plum:#6a3d95;
  --paper:#f4f1e9; --card:#ffffff; --ink:#242017; --muted:#7c7362; --line:#e5ddc9;
  --shadow-sm:0 1px 2px rgba(36,32,23,.06);
  --shadow-md:0 4px 14px rgba(36,32,23,.08);
  --shadow-lg:0 10px 30px rgba(36,32,23,.12);
  --radius:16px; --radius-sm:11px;
}
* { margin:0; padding:0; box-sizing:border-box; font-family:'Noto Sans Bengali','Hind Siliguri','Segoe UI',Arial,sans-serif; -webkit-tap-highlight-color:transparent; }
body { background:var(--paper); padding:10px; padding-bottom:80px; color:var(--ink); font-size:14px; line-height:1.45; }
.wrap { max-width:600px; margin:0 auto; }
.card { background:var(--card); border-radius:20px; box-shadow:var(--shadow-lg); overflow:hidden; border:1px solid rgba(36,32,23,.04); }

.header { background:linear-gradient(155deg,var(--forest-deep) 0%,var(--forest) 55%,#1f6b4a 100%); padding:22px 18px 28px; color:#fff; position:relative; overflow:hidden; }
.header::before{ content:''; position:absolute; right:-30px; top:-40px; width:150px; height:150px; border-radius:50%; background:rgba(255,255,255,.06); }
.header::after{ content:''; position:absolute; left:-20px; bottom:-50px; width:100px; height:100px; border-radius:50%; background:rgba(255,255,255,.05); }
.header h1 { font-size:22px; font-weight:700; letter-spacing:.1px; position:relative; }
.header p { font-size:12px; opacity:.78; margin-top:3px; position:relative; font-weight:500; }
.content { padding:14px 13px 6px; }

.btn { width:100%; padding:12px; border-radius:12px; font-weight:600; font-size:14px; border:none; cursor:pointer; color:#fff; transition:transform .1s ease, box-shadow .15s ease, filter .15s ease; box-shadow:var(--shadow-sm); letter-spacing:.1px; }
.btn:active{ transform:scale(.97); filter:brightness(.93); box-shadow:none; }
.btn-green { background:linear-gradient(155deg,#1d6647,var(--forest)); } 
.btn-blue { background:linear-gradient(155deg,#33538f,var(--indigo)); }
.btn-red { background:linear-gradient(155deg,#c1462f,var(--clay)); } 
.btn-purple { background:linear-gradient(155deg,#7745a8,var(--plum)); }
.btn-orange { background:linear-gradient(155deg,#a1650c,var(--wheat-deep)); }
.btn-sm { padding:8px 13px; font-size:12.5px; width:auto; border-radius:10px; box-shadow:none; }

input, select { width:100%; padding:11px 13px; border:1.5px solid var(--line); border-radius:var(--radius-sm); font-size:14px; margin-bottom:9px; background:#fdfcf8; color:var(--ink); transition:border-color .15s,box-shadow .15s; font-family:inherit; }
input:focus, select:focus { outline:none; border-color:var(--forest); box-shadow:0 0 0 3.5px rgba(27,89,64,.13); background:#fff; }
input::placeholder{ color:#a89c85; }

.box { padding:13px; border-radius:var(--radius-sm); margin:10px 0; }
.box-green { background:var(--forest-soft); border:1px solid #cee3d7; border-left:3.5px solid var(--forest); }
.box-blue { background:var(--indigo-soft); border:1px solid #d1ddf1; border-left:3.5px solid var(--indigo); }
.box-orange { background:var(--wheat-soft); border:1px solid #eddbb3; border-left:3.5px solid var(--wheat-deep); }
.box-yellow { background:#fbf5e2; border:1px solid #ecdca0; border-left:3.5px solid #a5750f; }

.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:9px; }

.item { background:var(--card); border:1px solid var(--line); border-radius:var(--radius-sm); margin:9px 0; overflow:hidden; box-shadow:var(--shadow-sm); transition:box-shadow .15s; }
.item-head { padding:13px 14px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; transition:background .15s; gap:8px; }
.item-head:active{ background:#f9f6ef; }
.item-body { border-top:1px dashed var(--line); padding:13px 14px; background:#fbfaf6; font-size:13px; }

.flex { display:flex; gap:8px; align-items:center; }
.between { display:flex; justify-content:space-between; align-items:center; }
.bold { font-weight:600; }
.green { color:var(--forest); } .red { color:var(--clay); } .blue { color:var(--indigo); } .gray { color:var(--muted); } .orange { color:var(--wheat-deep); }
.sm { font-size:12.5px; } .xs { font-size:11px; }
.center { text-align:center; }
.mt { margin-top:8px; } .mb { margin-bottom:8px; }
.note { text-align:center; color:#a89c85; font-size:11px; margin-top:10px; }

.cart-row { display:flex; align-items:center; gap:8px; background:#f9f6ef; padding:9px; border-radius:10px; margin-bottom:6px; border:1px solid var(--line); }
.cart-row input { width:64px; text-align:center; margin-bottom:0; }

.nav { position:fixed; bottom:8px; left:8px; right:8px; background:rgba(255,255,255,.92); backdrop-filter:blur(14px) saturate(1.4); border:1px solid rgba(36,32,23,.06); border-radius:22px; display:flex; box-shadow:0 8px 28px rgba(36,32,23,.14); padding:5px 3px; }
.nav button { flex:1; padding:8px 2px; background:none; border:none; cursor:pointer; color:#948a76; font-size:9.5px; font-weight:600; display:flex; flex-direction:column; align-items:center; gap:3px; border-radius:16px; margin:0 1px; transition:background .18s,color .18s,transform .12s; }
.nav button:active{ transform:scale(.92); }
.nav button.active { color:#fff; background:linear-gradient(155deg,#1d6647,var(--forest)); box-shadow:0 3px 10px rgba(27,89,64,.35); }
.nav .ico { font-size:18px; line-height:1; }

.stat { padding:15px 10px; border-radius:var(--radius-sm); text-align:center; border:1px solid rgba(36,32,23,.05); box-shadow:var(--shadow-sm); }
.stat .num { font-size:19px; font-weight:700; letter-spacing:0; }
.stat .lbl { font-size:10.5px; color:var(--muted); margin-top:4px; font-weight:600; }

label.upload { flex:1; background:linear-gradient(155deg,#7745a8,var(--plum)); color:#fff; padding:12px; border-radius:12px; font-weight:600; font-size:14px; text-align:center; cursor:pointer; display:block; box-shadow:var(--shadow-sm); }
label.upload input { display:none; }

.divider { border-top:1px dashed #d8cba0; margin:14px 0; }
.tag { display:inline-block; padding:3px 10px; border-radius:20px; font-size:9.5px; font-weight:700; vertical-align:middle; letter-spacing:.2px; }
.tag-red { background:var(--clay-soft); color:var(--clay); }
.tag-green { background:var(--forest-soft); color:var(--forest-deep); }
</style>
</head>
<body>
<div class="wrap">
<div class="card">
  <div class="header">
    <h1>🌾 NGF AGRO</h1>
    <p id="headerSub">বিজনেস ম্যানেজমেন্ট</p>
  </div>
  <div class="content" id="content"></div>
</div>
<p class="note">🔒 সব ডাটা আপনার ফোনে সংরক্ষিত</p>
</div>

<div class="nav">
  <button id="navHome" onclick="switchTab('dashboard')"><span class="ico">📊</span>হোম</button>
  <button id="navCustomer" onclick="switchTab('customer')"><span class="ico">👥</span>কাস্টমার</button>
  <button id="navDue" onclick="switchTab('due')"><span class="ico">💰</span>বকেয়া</button>
  <button id="navSupplier" onclick="switchTab('supplier')"><span class="ico">🏭</span>সাপ্লায়ার</button>
  <button id="navStock" onclick="switchTab('stock')"><span class="ico">📦</span>স্টক</button>
  <button id="navMore" onclick="switchTab('more')"><span class="ico">⚙️</span>আরও</button>
</div>

<script>
let stock = JSON.parse(localStorage.getItem('ngfStock') || '[]');
let customers = JSON.parse(localStorage.getItem('ngfCustomers') || '[]');
let suppliers = JSON.parse(localStorage.getItem('ngfSuppliers') || '[]');
let withdrawals = JSON.parse(localStorage.getItem('ngfWithdrawals') || '[]');
let inactiveDaysLimit = parseInt(localStorage.getItem('ngfInactiveDays') || '30');
let activeTab = 'dashboard';
let showAddStock=false, showAddCustomer=false, showAddSupplier=false;
let expandedStock=null, expandedCustomer=null, expandedSupplier=null;
let cart = {};
let custSearch = '';
let dueSearch = '';
let expandedMonth = null;
let expandedTopMonth = null;
let expandedTimeline = null;
let editingSale = null; // {custId, saleId, myFreight, custFreight}
let showSalesReport = false;
let selectedExisting = null;
let existSearch = '';
let goodsSearch = '';

function save() {
  localStorage.setItem('ngfStock', JSON.stringify(stock));
  localStorage.setItem('ngfCustomers', JSON.stringify(customers));
  localStorage.setItem('ngfSuppliers', JSON.stringify(suppliers));
  localStorage.setItem('ngfWithdrawals', JSON.stringify(withdrawals));
}
function bn(n){ return (Math.round((n||0)*100)/100).toLocaleString('bn-BD'); }
// কার্যকর বাকি: ১ টাকার কম (পয়সা) হলে ০ ধরা হবে
function netDue(c){ const d=c.totalSale-c.totalPaid; return Math.abs(d)<1?0:d; }
// কাস্টমার/আইটেমের timestamp: ts না থাকলে id ব্যবহার (id ও Date.now() ছিল)
function getTS(c){ return c.ts || c.id || 0; }

// পুরনো কাস্টমার (sales অ্যারে নেই) কে নতুন কাঠামোয় রূপান্তর - অন-দ্য-ফ্লাই
function migrateCustomer(c){
  if(c.sales) return c; // ইতিমধ্যে নতুন কাঠামো
  const allItems=c.items||[];
  // "আগের বকেয়া" আইটেম আলাদা করি
  const oldDueItems=allItems.filter(it=>it.isOldDue || it.itemName==='আগের বকেয়া');
  const goodsItems=allItems.filter(it=>!(it.isOldDue || it.itemName==='আগের বকেয়া'));
  // আগের বকেয়ার মোট
  let oldDueAmount=oldDueItems.reduce((a,it)=>a+(it.saleAmount||0),0);
  // যদি oldDueAmount ফিল্ড আলাদা থাকে সেটাও ধরি (নতুন সেভে ছিল)
  if(c.oldDueAmount && oldDueAmount===0) oldDueAmount=c.oldDueAmount;
  // সাধারণ মালের বিক্রয়
  const goodsSale=goodsItems.reduce((a,it)=>a+(it.saleAmount||0),0);
  const sales=[];
  if(goodsItems.length>0){
    sales.push({
      id:c.id, ts:getTS(c), date:c.date||now(),
      items:goodsItems,
      totalSale:goodsSale,
      totalProfit:c.totalProfit||0,
      myFreight:c.myFreight||0, custFreight:c.custFreight||0
    });
  }
  return {
    id:c.id, name:c.name, mobile:c.mobile, address:c.address||'',
    sales:sales,
    oldDue:oldDueAmount,
    payments:c.payments||[],
    firstTS:getTS(c)
  };
}

// একজন কাস্টমারের মোট হিসাব বের করা
function custTotals(c){
  c=migrateCustomer(c);
  let totalSale=0, totalProfit=0, totalMyFreight=0;
  (c.sales||[]).forEach(s=>{ totalSale+=s.totalSale||0; totalProfit+=s.totalProfit||0; totalMyFreight+=s.myFreight||0; });
  totalSale+=(c.oldDue||0); // আগের বকেয়া মোট পাওনায় যোগ (লাভে নয়)
  const totalPaid=(c.payments||[]).reduce((a,p)=>a+p.amount,0);
  const totalDiscount=(c.discounts||[]).reduce((a,d)=>a+d.amount,0);
  return {totalSale,totalProfit,totalPaid,totalMyFreight,totalDiscount,netProfit:totalProfit-totalDiscount,balance:totalSale-totalPaid-totalDiscount};
}
// কার্যকর বাকি (পয়সা বাদ)
function custNetDue(c){ const b=custTotals(c).balance; return Math.abs(b)<1?0:b; }
// কাস্টমারের সব লেনদেন সময়ানুক্রমে (মাল, জমা, আগের বকেয়া, ছাড়) - চলমান বাকি সহ
function custTimeline(c){
  c=migrateCustomer(c);
  const events=[];
  if(c.oldDue>0){ events.push({type:'olddue', ts:c.firstTS||0, amount:c.oldDue, label:'আগের/শুরুর বকেয়া'}); }
  (c.sales||[]).forEach(s=>{ events.push({type:'sale', ts:s.ts, sale:s}); });
  (c.payments||[]).forEach(p=>{ events.push({type:'payment', ts:p.ts||0, amount:p.amount, date:p.date}); });
  (c.discounts||[]).forEach(d=>{ events.push({type:'discount', ts:d.ts||0, amount:d.amount, date:d.date, note:d.note}); });
  events.sort((a,b)=>a.ts-b.ts);
  let running=0;
  events.forEach(e=>{
    if(e.type==='olddue') running+=e.amount;
    else if(e.type==='sale') running+=e.sale.totalSale||0;
    else if(e.type==='payment') running-=e.amount;
    else if(e.type==='discount') running-=e.amount;
    e.runningBal=running;
  });
  return events;
}
// কাস্টমারের শেষ লেনদেনের সময়
function custLastTS(c){ c=migrateCustomer(c); let t=c.firstTS||getTS(c); (c.sales||[]).forEach(s=>{ if(s.ts>t) t=s.ts; }); (c.payments||[]).forEach(p=>{ if(p.ts&&p.ts>t) t=p.ts; }); return t; }
// শেষ লেনদেনের পর কত দিন গেছে
function daysSince(ts){ if(!ts) return 9999; return Math.floor((Date.now()-ts)/86400000); }
// মালিকের উত্তোলন যোগ
function addWithdrawal(){
  const inp=document.getElementById('wdAmount');
  const note=document.getElementById('wdNote');
  const amt=parseFloat(inp.value);
  if(!amt||amt<=0){ alert('টাকার পরিমাণ দিন'); return; }
  withdrawals.push({id:Date.now(),ts:Date.now(),amount:amt,note:(note.value||'').trim(),date:now()});
  save(); render();
}
// নির্দিষ্ট কাস্টমারের নিজস্ব খোঁজ-সতর্কতার দিন
function custLimit(c){ return c.inactiveDays || inactiveDaysLimit; }
function setCustInactive(id){
  const inp=document.getElementById('inact-'+id);
  const v=parseInt(inp.value);
  customers=customers.map(c=>{ c=migrateCustomer(c); if(c.id.toString()===id.toString()){ return {...c, inactiveDays:(v&&v>0)?v:undefined}; } return c; });
  save(); render();
  alert(v&&v>0?('এই কাস্টমারের জন্য '+v+' দিন সেট হলো'):'ডিফল্ট সেটিংয়ে ফিরে গেল');
}
function setInactiveDays(){
  const inp=document.getElementById('inactiveDaysInput');
  const v=parseInt(inp.value);
  if(!v||v<1){ alert('১ বা তার বেশি দিন দিন'); return; }
  inactiveDaysLimit=v;
  localStorage.setItem('ngfInactiveDays', v.toString());
  render();
  alert('সেট হয়েছে! এখন '+v+' দিন খোঁজ না থাকলে জানাবে।');
}
function delWithdrawal(id){ if(confirm('এই উত্তোলন মুছবেন?')){ withdrawals=withdrawals.filter(w=>w.id!==id); save(); render(); } }
// মাসভিত্তিক লাভ হিসাব
function monthlyProfits(){
  const map={};
  customers.forEach(c=>{ c=migrateCustomer(c); (c.sales||[]).forEach(s=>{
    const d=new Date(s.ts); const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    if(!map[k]) map[k]={profit:0,sale:0,label:d.toLocaleDateString('bn-BD',{month:'long',year:'numeric'}),key:k,days:{}};
    map[k].profit+=s.totalProfit||0; map[k].sale+=s.totalSale||0;
    const dk=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(!map[k].days[dk]) map[k].days[dk]={profit:0,sale:0,label:d.toLocaleDateString('bn-BD',{day:'numeric',month:'long'})};
    map[k].days[dk].profit+=s.totalProfit||0; map[k].days[dk].sale+=s.totalSale||0;
  }); });
  return Object.keys(map).sort().reverse().map(k=>map[k]);
}
// কাস্টমারের মাসভিত্তিক ওজন ও টাকার হিসাব
function custMonthlyKg(c){
  c=migrateCustomer(c);
  const map={};
  (c.sales||[]).forEach(s=>{
    const d=new Date(s.ts); const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    if(!map[k]) map[k]={kg:0,taka:0,label:d.toLocaleDateString('bn-BD',{month:'long',year:'numeric'})};
    s.items.forEach(it=>{ map[k].kg+=(it.kg||0); });
    map[k].taka+=s.totalSale||0;
  });
  return Object.keys(map).sort().reverse().map(k=>map[k]);
}
// মালের নাম থেকে শেষের (তারিখ) অংশ বাদ দিয়ে মূল নাম বের করা - যেমন "সয়াবিন ভুষি (৩০-০৬-২০২৬)" → "সয়াবিন ভুষি"
function baseItemName(name){
  let n=(name||'').trim();
  // সম্পূর্ণ বন্ধনী সহ তারিখ: (৩০-০৬-২০২৬)
  n=n.replace(/\s*\([০-৯0-9]{1,2}[-\/][০-৯0-9]{1,2}[-\/][০-৯0-9]{2,4}\)?\s*$/,'');
  // শেষে খোলা বন্ধনী দিয়ে অসম্পূর্ণ তারিখ: (২৫-০৬-২০২৭
  n=n.replace(/\s*\([০-৯0-9]{1,2}[-\/][০-৯0-9]{1,2}[-\/][০-৯0-9]{2,4}$/,'');
  // এখনও কোনো বন্ধনী/তারিখের ছিটেফোঁটা থাকলে বাদ
  n=n.replace(/[\(\)]+\s*$/,'').trim();
  // ম্যানুয়াল মাল-মেলানো তালিকা প্রয়োগ (ইউজার সেট করা)
  const aliases=JSON.parse(localStorage.getItem('ngfItemAliases')||'{}');
  const key=n.toLowerCase();
  if(aliases[key]) n=aliases[key];
  return n.trim();
}
// এই মাসে কোন মাল কত বিক্রি হয়েছে (সিরিয়ালি সাজানো, ব্যাচ-তারিখ একসাথে যোগ)
function topSellingThisMonth(){
  const all=monthlyTopSelling();
  return all.length>0 ? all[0].items : [];
}
// প্রতিটা মাসের জন্য আলাদা সেরা-বিক্রিত মালের তালিকা (সারা বছর/সব মাস)
function monthlyTopSelling(){
  const monthMap={};
  customers.forEach(c=>{ c=migrateCustomer(c); (c.sales||[]).forEach(s=>{
    const d=new Date(s.ts); const mk=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    if(!monthMap[mk]) monthMap[mk]={key:mk,label:d.toLocaleDateString('bn-BD',{month:'long',year:'numeric'}),items:{}};
    s.items.forEach(it=>{
      if(it.isOldDue) return;
      const base=baseItemName(it.itemName);
      if(!monthMap[mk].items[base]) monthMap[mk].items[base]={name:base,kg:0,taka:0,bags:0};
      monthMap[mk].items[base].kg+=(it.kg||0); monthMap[mk].items[base].taka+=(it.saleAmount||0); monthMap[mk].items[base].bags+=(it.bags||0);
    });
  }); });
  return Object.keys(monthMap).sort().reverse().map(mk=>{
    const m=monthMap[mk];
    return {key:m.key, label:m.label, items:Object.values(m.items).sort((a,b)=>b.kg-a.kg)};
  });
}

// timestamp দিয়ে আজ চেক
function tsToday(ts){ if(!ts) return false; const d=new Date(ts),n=new Date(); return d.getDate()===n.getDate()&&d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear(); }
// এই মাসের চেক
function tsThisMonth(ts){ if(!ts) return false; const d=new Date(ts),n=new Date(); return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear(); }
// তারিখ গ্রুপের লেবেল (আজ/গতকাল/তারিখ)
function dateGroupLabel(ts){
  if(!ts) return 'তারিখ নেই';
  const d=new Date(ts),n=new Date();
  const today=new Date(n.getFullYear(),n.getMonth(),n.getDate());
  const that=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  const diff=Math.round((today-that)/86400000);
  if(diff===0) return 'আজ';
  if(diff===1) return 'গতকাল';
  return d.toLocaleDateString('bn-BD',{day:'numeric',month:'long',year:'numeric'});
}
function dateGroupKey(ts){ if(!ts) return '0'; const d=new Date(ts); return d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate(); }

}
function setCartRate(id,val){
  const r=parseFloat(val);

  if(cart[id]){ cart[id].rate=(!r||r<=0)?it.salePrice:r; }

}

  updateCartTotal();
}
function cartTotal(){ let t=0; Object.keys(cart).forEach(id=>{ const it=stock.find(s=>s.id==id); if(it) t+=cart[id].bags*cart[id].weight*cart[id].rate; }); return t; }
function cartTotalKg(){ let k=0; Object.keys(cart).forEach(id=>{ const it=stock.find(s=>s.id==id); if(it) k+=cart[id].bags*cart[id].weight; }); return k; }

/* ---------- CUSTOMER ---------- */
function saveCustomer(){
  const name=document.getElementById('cName').value.trim();
  const mobile=document.getElementById('cMobile').value.trim();
  const addr=document.getElementById('cAddr').value.trim();
  const paidNow=parseFloat(document.getElementById('cPaid').value)||0;
  const oldDue=parseFloat(document.getElementById('cOldDue').value)||0;
  const myFreight=parseFloat(document.getElementById('cMyFreight').value)||0;
  const custFreight=parseFloat(document.getElementById('cCustFreight').value)||0;
  const freightDue=parseFloat(document.getElementById('cFreightDue').value)||0;
  if(!selectedExisting && (!name||!mobile)){ alert('নাম ও মোবাইল দিন'); return; }
  if(Object.keys(cart).length===0 && oldDue<=0 && paidNow<=0){ alert('মাল সিলেক্ট করুন, অথবা বকেয়া/জমা লিখুন'); return; }
  // নতুন কাস্টমার হলে একই নম্বর আছে কিনা চেক করি
  if(!selectedExisting){
    function cleanMob(m){ return (m||'').replace(/[^0-9]/g,''); }
    const newMob=cleanMob(mobile);
    if(newMob.length>=6){
      const existing=customers.find(c=>cleanMob(c.mobile)===newMob);
      if(existing){
        const ex=migrateCustomer(existing);
        const t=custTotals(ex);
        const msg='⚠️ এই নম্বরে ইতিমধ্যে কাস্টমার আছে:\n\n'
          +'নাম: '+ex.name+'\n'
          +'বাকি: ৳'+bn(custNetDue(ex))+'\n\n'
          +'"OK" চাপলে এই বিক্রয় '+ex.name+'-এর সাথে যুক্ত হবে।\n'
          +'"Cancel" চাপলে আলাদা নতুন কাস্টমার হিসেবে যোগ হবে।';
        if(confirm(msg)){
          // পুরনো কাস্টমারে যুক্ত করি
          selectedExisting=existing.id;
        }
        // Cancel হলে selectedExisting=null থাকবে, নতুন কাস্টমার হবে
      }
    }
  }
  for(let id of Object.keys(cart)){ const it=stock.find(s=>s.id==id); if(cart[id].bags>it.totalBags){ alert(it.name+': শুধু '+it.totalBags+' বস্তা আছে'); return; } }

  // বিক্রয়ের আইটেম ও হিসাব তৈরি + স্টক কমানো
  let saleTotal=0, saleCost=0; const items=[];
  stock=stock.map(it=>{
    const cv=cart[it.id];
    if(cv){ const b=cv.bags, rate=cv.rate, wt=cv.weight, kg=b*wt, sa=kg*rate, ca=kg*it.costPrice; saleTotal+=sa; saleCost+=ca;
      items.push({itemName:it.name,bags:b,kg,rate:rate,weight:wt,saleAmount:sa,profit:sa-ca});
      return {...it,totalBags:it.totalBags-b,totalKg:(it.totalBags-b)*it.bagWeight}; }
    return it;
  });

  // বাকিতে দেওয়া ভাড়া - বিলে যোগ হবে, লাভে প্রভাব নেই
  if(freightDue>0){
    items.push({itemName:'🚚 গাড়ি ভাড়া (আমি দিয়েছি, ফেরত পাব)',bags:0,kg:0,saleAmount:freightDue,profit:0,isOldDue:true});
    saleTotal+=freightDue;
  }

  const saleProfit=(saleTotal-saleCost-freightDue)-myFreight;

  // নতুন বিক্রয় অবজেক্ট (যদি মাল থাকে)
  let newSale=null;
  if(items.length>0){
    if(editingSale){
      newSale={ id:editingSale.saleId, ts:editingSale.ts, date:editingSale.date, items, totalSale:saleTotal, totalProfit:saleProfit, myFreight, custFreight };
    } else {
      newSale={ id:Date.now(), ts:Date.now(), date:now(), items, totalSale:saleTotal, totalProfit:saleProfit, myFreight, custFreight };
    }
  }

  const paymentEntry = paidNow>0 ? [{amount:paidNow,date:now(),ts:Date.now()}] : [];

  // পুরাতন কাস্টমার সিলেক্ট করা থাকলে তার নিচে যোগ করি
  if(selectedExisting){
    customers=customers.map(c=>{
      c=migrateCustomer(c);
      if(c.id.toString()===selectedExisting.toString()){
        let sales=(c.sales||[]).slice();
        if(editingSale){ sales=sales.filter(s=>s.id.toString()!==editingSale.saleId.toString()); }
        if(newSale) sales.push(newSale);
        return {...c, sales, oldDue:(c.oldDue||0)+oldDue, payments:(c.payments||[]).concat(paymentEntry), address:c.address||addr };
      }
      return c;
    });
  } else {
    // নতুন কাস্টমার তৈরি
    customers.push({
      id:Date.now(), name, mobile, address:addr,
      sales:newSale?[newSale]:[],
      oldDue:oldDue,
      payments:paymentEntry,
      firstTS:Date.now()
    });
  }

  cart={}; selectedExisting=null; editingSale=null; save(); showAddCustomer=false; render();
}

// একটা নির্দিষ্ট দিনের/বিক্রয়ের রসিদ কপি
function copySaleReceipt(custId, saleId){
  let c=customers.find(x=>x.id.toString()===custId.toString());
  c=migrateCustomer(c);
  const s=(c.sales||[]).find(x=>x.id.toString()===saleId.toString());
  if(!s) return;
  const bal=custNetDue(c);
  // এই বিক্রয়ের পর থেকে পরের বিক্রয়ের আগ পর্যন্ত (বা এখন পর্যন্ত) যত জমা/ছাড় পড়েছে
  const salesSorted=(c.sales||[]).slice().sort((a,b)=>a.ts-b.ts);
  const idx=salesSorted.findIndex(x=>x.id.toString()===saleId.toString());
  const nextSaleTS = (idx>=0 && idx<salesSorted.length-1) ? salesSorted[idx+1].ts : Infinity;
  const paymentsAfter=(c.payments||[]).filter(p=>(p.ts||0)>=s.ts && (p.ts||0)<nextSaleTS).sort((a,b)=>(a.ts||0)-(b.ts||0));
  const discountsAfter=(c.discounts||[]).filter(d=>(d.ts||0)>=s.ts && (d.ts||0)<nextSaleTS).sort((a,b)=>(a.ts||0)-(b.ts||0));

  let t='🌾 NGF AGRO\n';
  t+='━━━━━━━━━━━━━━━\n';
  t+='কাস্টমার: '+c.name+'\n';
  t+='📅 তারিখ: '+s.date+'\n';
  t+='━━━━━━━━━━━━━━━\n';
  t+='📦 এই দিনের মাল:\n';
  s.items.forEach(it=>{
    if(it.isOldDue){ t+='• '+it.itemName+' = ৳'+bn(it.saleAmount)+'\n'; }
    else { t+='• '+it.itemName+' '+it.bags+' বস্তা ('+bn(it.kg)+' কেজি) @৳'+(it.rate||'')+' = ৳'+bn(it.saleAmount)+'\n'; }
  });
  if(s.custFreight>0) t+='• ভাড়া (কাস্টমার বহন): ৳'+bn(s.custFreight)+'\n';
  t+='মোট ওজন: '+bn(s.items.reduce((a,it)=>a+(it.kg||0),0))+' কেজি\n';
  t+='এই দিনের মালের মোট: ৳'+bn(s.totalSale)+'\n';

  if(paymentsAfter.length>0 || discountsAfter.length>0){
    t+='━━━━━━━━━━━━━━━\n';

function editSale(custId, saleId){
  let cust=customers.find(x=>x.id.toString()===custId.toString());
  cust=migrateCustomer(cust);
  const sale=(cust.sales||[]).find(s=>s.id.toString()===saleId.toString());
  if(!sale) return;
  // এই বিক্রয়ের মাল সাময়িকভাবে স্টকে ফেরত দিই (এডিট শেষে আবার বাদ যাবে)
  stock=stock.map(st=>{
    const it=sale.items.find(x=>!x.isOldDue && x.itemName===st.name);
    if(it){ const nb=st.totalBags+it.bags; return {...st, totalBags:nb, totalKg:nb*st.bagWeight}; }
    return st;
  });
  // কার্ট পুনর্গঠন
  cart={};
  sale.items.forEach(it=>{
    if(it.isOldDue) return;
    const st=stock.find(s=>s.name===it.itemName);
    if(st) cart[st.id]={bags:it.bags, rate:it.rate||st.salePrice, weight:it.weight||st.bagWeight};
  });
  selectedExisting=custId;
  editingSale={custId, saleId, myFreight:sale.myFreight||0, custFreight:sale.custFreight||0, date:sale.date, ts:sale.ts, originalItems:JSON.parse(JSON.stringify(sale.items))};
  showAddCustomer=true; existSearch=''; goodsSearch='';
  activeTab='customer';
  render();
}
function cancelEditSale(){
  // মূল বিক্রয়ের হিসাব অনুযায়ী স্টক আবার বাদ দিয়ে যেমন ছিল তেমন করি
  if(editingSale && editingSale.originalItems){
    editingSale.originalItems.forEach(it=>{
      if(it.isOldDue) return;
      stock=stock.map(st=>{ if(st.name===it.itemName){ const nb=Math.max(0,st.totalBags-it.bags); return {...st,totalBags:nb,totalKg:nb*st.bagWeight}; } return st; });
    });
  }
  cart={}; selectedExisting=null; editingSale=null; showAddCustomer=false; render();
}
function delSale(custId, saleId){
  if(!confirm('এই বিক্রয়টি মুছবেন? স্টক ফেরত যাবে।')) return;
  customers=customers.map(c=>{
    c=migrateCustomer(c);
    if(c.id.toString()===custId.toString()){
      const sale=(c.sales||[]).find(s=>s.id.toString()===saleId.toString());
      if(sale){ // স্টক ফেরত
        sale.items.forEach(it=>{
          stock=stock.map(st=>{ if(st.name===it.itemName){ const nb=st.totalBags+it.bags; return {...st,totalBags:nb,totalKg:nb*st.bagWeight}; } return st; });
        });
      }
      return {...c, sales:(c.sales||[]).filter(s=>s.id.toString()!==saleId.toString())};
    }
    return c;
  });
  save(); render();
}
function delCustomer(id){ if(confirm('ডিলিট করবেন?')){ customers=customers.filter(c=>c.id!==id); save(); render(); } }
function addCustomerPayment(id){
  const inp=document.getElementById('pay-'+id); const amt=parseFloat(inp.value);
  if(amt>0){ customers=customers.map(c=>{ c=migrateCustomer(c); if(c.id.toString()===id.toString()){ return {...c,payments:[...(c.payments||[]),{amount:amt,date:now(),ts:Date.now()}]}; } return c; }); save(); render(); }
}

function saveSupplier(){
  const name=document.getElementById('spName').value.trim();
  const mobile=document.getElementById('spMobile').value.trim();
  const desc=document.getElementById('spDesc').value.trim();
  const amount=parseFloat(document.getElementById('spAmount').value);
  const paid=parseFloat(document.getElementById('spPaid').value)||0;
  if(!name||!amount){ alert('নাম ও মোট টাকা দিন'); return; }
  const payments = paid>0 ? [{amount:paid,date:now()}] : [];
  suppliers.push({id:Date.now(),name,mobile,desc,totalAmount:amount,totalPaid:paid,payments,date:now()});
  save(); showAddSupplier=false; render();
}
function delSupplier(id){ if(confirm('ডিলিট করবেন?')){ suppliers=suppliers.filter(s=>s.id!==id); save(); render(); } }
function addSupplierPayment(id){
  const inp=document.getElementById('sppay-'+id); const amt=parseFloat(inp.value);
  if(amt>0){ suppliers=suppliers.map(s=>{ if(s.id===id){ const p=s.payments||[]; return {...s,totalPaid:s.totalPaid+amt,payments:[...p,{amount:amt,date:now()}]}; } return s; }); save(); render(); }
}
// পুরনো সাপ্লায়ার থেকে নতুন মাল/দেনা যোগ
function addSupplierDue(id){
  const amtInp=document.getElementById('spdue-'+id);
  const descInp=document.getElementById('spduedesc-'+id);
  const amt=parseFloat(amtInp.value);
  if(!amt||amt<=0){ alert('টাকার পরিমাণ দিন'); return; }
  const desc=(descInp.value||'').trim();
  suppliers=suppliers.map(s=>{
    if(s.id===id){
      const purchases=s.purchases||[{desc:s.desc,amount:s.totalAmount,date:s.date}];
      return {...s, totalAmount:s.totalAmount+amt, purchases:[...purchases,{desc:desc||'নতুন মাল',amount:amt,date:now()}]};
    }
    return s;
  });
  save(); render();
}

function dl(content,fname,type){
  const bom='\uFEFF';

  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=fname; a.click();
}
function importJSON(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{ try{ const d=JSON.parse(ev.target.result); stock=d.stock||[]; customers=d.customers||[]; suppliers=d.suppliers||[]; withdrawals=d.withdrawals||[]; save(); render(); alert('ডাটা ফিরে এসেছে!'); }catch{ alert('ফাইল ঠিক নেই'); } };
  r.readAsText(f);
}

  const sub={dashboard:'আজকের হিসাব ও সারসংক্ষেপ',customer:'যাদের কাছে আমি পাবো',due:'সব বকেয়ার তালিকা',supplier:'যাদের আমি টাকা দিবো',stock:'মালের মজুদ',more:'ব্যাকআপ ও সেটিংস'};
  document.getElementById('headerSub').innerText=sub[activeTab]||'বিজনেস ম্যানেজমেন্ট';
  const c=document.getElementById('content');
  if(activeTab==='dashboard') c.innerHTML=renderDashboard();
  else if(activeTab==='customer') c.innerHTML=renderCustomer();
  else if(activeTab==='due') c.innerHTML=renderDue();
  else if(activeTab==='supplier') c.innerHTML=renderSupplier();
  else if(activeTab==='stock') c.innerHTML=renderStock();
  else if(activeTab==='more') c.innerHTML=renderMore();
  updateCartTotal();
}

function renderDashboard(){
  // সব বিক্রয় একত্র করি (প্রতিটা sale ধরে হিসাব)
  let todaySaleAmt=0, todayProfit=0, monthProfit=0, monthSaleAmt=0, totalProfit=0, totalMyFreight=0, todaySaleCount=0;
  customers.forEach(c=>{
    c=migrateCustomer(c);
    (c.sales||[]).forEach(s=>{
      totalProfit+=s.totalProfit||0;
      totalMyFreight+=s.myFreight||0;
      if(tsToday(s.ts)){ todaySaleAmt+=s.totalSale||0; todayProfit+=s.totalProfit||0; todaySaleCount++; }
      if(tsThisMonth(s.ts)){ monthSaleAmt+=s.totalSale||0; monthProfit+=s.totalProfit||0; }
    });
  });
  let todayCollected=0;
  customers.forEach(c=>{ c=migrateCustomer(c); (c.payments||[]).forEach(p=>{ if(isToday(p.date)) todayCollected+=p.amount; }); });

  const totalDue=customers.reduce((s,c)=>s+custNetDue(c),0);
  const myDebt=suppliers.reduce((s,sp)=>s+(sp.totalAmount-sp.totalPaid),0);
  const stockValue=stock.reduce((s,it)=>s+it.totalKg*it.salePrice,0);

  let h='';
  // আজকের হিসাব
  h+='<div class="box-orange box"><div class="bold orange mb">📅 আজকের হিসাব</div>';
  h+='<div class="grid2">';
  h+='<div class="stat" style="background:#fff7ed"><div class="num orange">৳'+bn(todaySaleAmt)+'</div><div class="lbl gray">আজকের বিক্রয়</div></div>';
  h+='<div class="stat" style="background:#fff7ed"><div class="num green">৳'+bn(todayProfit)+'</div><div class="lbl gray">আজকের লাভ</div></div>';
  h+='</div>';
  h+='<div class="stat mt" style="background:#fff7ed"><div class="num blue">৳'+bn(todayCollected)+'</div><div class="lbl gray">আজ জমা পেয়েছি</div></div>';
  h+='<div class="xs gray center mt">আজ '+todaySaleCount+' টি বিক্রয় হয়েছে</div>';
  h+='</div>';

  // লাভের হিসাব - তিন রকম
  h+='<div class="box box-green"><div class="bold green mb">📈 লাভের হিসাব</div><div class="grid2">';
  h+='<div class="stat" style="background:#dcfce7"><div class="num green">৳'+bn(todayProfit)+'</div><div class="lbl gray">আজকের লাভ</div></div>';
  h+='<div class="stat" style="background:#dcfce7"><div class="num green">৳'+bn(monthProfit)+'</div><div class="lbl gray">এই মাসের লাভ</div></div>';
  h+='</div>';
  h+='<div class="stat mt" style="background:#bbf7d0"><div class="num green">৳'+bn(totalProfit)+'</div><div class="lbl gray">সব মিলিয়ে মোট লাভ (শুরু থেকে)</div></div>';
  h+='<div class="xs gray center mt">এই মাসের বিক্রয়: ৳'+bn(monthSaleAmt)+'</div>';
  if(totalMyFreight>0) h+='<div class="xs red center mt">🚚 মোট ভাড়া খরচ (লাভ থেকে বাদ): ৳'+bn(totalMyFreight)+'</div>';
  const totalWd=withdrawals.reduce((s,w)=>s+w.amount,0);
  const totalDisc=customers.reduce((s,c)=>{ c=migrateCustomer(c); return s+(c.discounts||[]).reduce((a,d)=>a+d.amount,0); },0);
  if(totalDisc>0) h+='<div class="xs orange center mt">🏷️ মোট ছাড়/মওকুফ (লাভ থেকে বাদ): ৳'+bn(totalDisc)+'</div>';
  h+='<div class="between xs mt" style="border-top:1px dashed #cbe5d2;padding-top:6px"><span class="gray">💼 মালিকের উত্তোলন:</span><b class="orange">৳'+bn(totalWd)+'</b></div>';
  h+='<div class="between sm bold"><span>হাতে থাকা লাভ:</span><b class="green">৳'+bn(totalProfit-totalDisc-totalWd)+'</b></div>';
  h+='</div>';

  // ৩০+ দিন খোঁজ নেই এমন বকেয়াদার
  const inactive=customers.filter(c=>custNetDue(c)>0 && daysSince(custLastTS(c))>=custLimit(c));
  if(inactive.length>0){
    h+='<div class="box" style="background:#fdecea;border:1px solid #f5c6c0;border-left:4px solid var(--red)">';
    h+='<div class="bold red sm">⏰ '+inactive.length+' জন বকেয়াদারের অনেকদিন খোঁজ নেই!</div>';
    inactive.slice(0,5).forEach(c=>{
      h+='<div class="between xs mt"><span>'+c.name+' ('+daysSince(custLastTS(c))+' দিন)</span><span class="red bold">৳'+bn(custNetDue(c))+'</span></div>';
    });
    h+='<button class="btn btn-red btn-sm mt" style="width:100%" onclick="switchTab(\'due\')">বকেয়া তালিকায় যান</button>';
    h+='</div>';
  }

  // মাসিক লাভের খাতা
  const months=monthlyProfits();
  if(months.length>0){
    h+='<div class="box box-green"><div class="bold green sm mb">📅 মাসিক লাভের খাতা <span class="xs gray">(তারিখে চাপুন)</span></div>';
    months.forEach(mo=>{
      const open=expandedMonth===mo.key;
      h+='<div onclick="toggleMonth(\''+mo.key+'\')" style="cursor:pointer;padding:4px 0;border-bottom:1px solid #cfe3d7"><div class="between xs"><span>'+(open?'▼ ':'▶ ')+mo.label+'</span><span><span class="gray">বিক্রয় ৳'+bn(mo.sale)+'</span> | <b class="green">লাভ ৳'+bn(mo.profit)+'</b></span></div></div>';
      if(open){
        h+='<div style="background:#fbfdfb;border-radius:6px;padding:6px;margin:4px 0 8px" class="xs">';
        const dayKeys=Object.keys(mo.days).sort().reverse();
        dayKeys.forEach(dk=>{
          const day=mo.days[dk];
          h+='<div class="between" style="padding:3px 0"><span class="gray">'+day.label+'</span><span><span class="gray">৳'+bn(day.sale)+'</span> | <b class="green">লাভ ৳'+bn(day.profit)+'</b></span></div>';
        });
        h+='</div>';
      }
    });
    h+='</div>';
  }

  // পাওনা-দেনা
  h+='<div class="grid2">';
  h+='<div class="stat" style="background:#fee2e2"><div class="num red">৳'+bn(totalDue)+'</div><div class="lbl gray">কাস্টমারের কাছে পাওনা</div></div>';
  h+='<div class="stat" style="background:#fef9c3"><div class="num orange">৳'+bn(myDebt)+'</div><div class="lbl gray">সাপ্লায়ারকে দেনা</div></div>';
  h+='</div>';
  h+='<div class="stat mt" style="background:#eff6ff"><div class="num blue">৳'+bn(stockValue)+'</div><div class="lbl gray">স্টকের মূল্য</div></div>';

  // টপ বাকিদার
  const dueList=customers.filter(c=>custNetDue(c)>0).sort((a,b)=>custNetDue(b)-custNetDue(a)).slice(0,5);
  h+='<div class="divider"></div>';
  h+='<div class="bold sm mb">🔴 সবচেয়ে বেশি বাকি যাদের</div>';
  if(dueList.length===0){ h+='<p class="xs gray center" style="padding:8px">কোনো বাকি নেই 🎉</p>'; }
  else { dueList.forEach(c=>{ const bal=custNetDue(c); h+='<div class="between" style="padding:8px;background:#f9fafb;border-radius:6px;margin-bottom:5px"><div><div class="sm bold">'+c.name+'</div><div class="xs gray">📱'+c.mobile+'</div></div><div class="red bold">৳'+bn(bal)+'</div></div>'; }); }

  h+='<button class="btn btn-green mt" onclick="switchTab(\'customer\')">+ নতুন বিক্রয় / কাস্টমার</button>';
  return h;
}

      h+=`<div style="padding:4px 0 8px">`;

        h+=`<div class="between xs" style="padding:4px 0;border-bottom:1px solid #f0ece0">

        <div><span class="bold sm">${i+1}. ${r.name}</span><div class="xs gray">${r.bags} বস্তা • ${bn(r.kg)} কেজি</div></div>
        <div style="text-align:right"><div class="bold blue">৳${bn(r.taka)}</div><div class="xs green">লাভ ৳${bn(r.profit)}</div></div>
      </div>`;
    });
    h+=`</div>`;

  h+=`<button class="btn btn-blue" onclick="toggleAddStock()">${showAddStock?'✕ বাতিল':'+ নতুন মাল যোগ করুন'}</button>`;

      <input id="sName" placeholder="মালের নাম (যেমন: ভুট্টা)">

        <input id="sBagWeight" type="number" placeholder="প্রতি বস্তা কত কেজি">

      <button class="btn btn-blue" onclick="addStock()">যোগ করুন</button>
    </div>`;

  if(stock.length===0) h+=`<p class="center gray sm" style="padding:24px">কোনো মাল নেই</p>`;

    h+=`<div class="item"><div class="item-head" onclick="toggleStock(${it.id})">

        </div>
        <div class="box box-blue xs mt">
          <div class="bold blue mb">✏️ স্টকের তথ্য ঠিক করুন</div>
          <div class="xs gray mb">ওজন কম/বেশি হলে বা দাম বদলালে এখানে ঠিক করুন</div>
          <div class="flex" style="gap:6px;margin-bottom:6px">
            <input type="number" id="ew-${it.id}" placeholder="বস্তার ওজন (${it.bagWeight})" value="${it.bagWeight}" style="flex:1;margin-bottom:0">
            <input type="number" id="ec-${it.id}" placeholder="কেনা ৳${it.costPrice}" value="${it.costPrice}" style="flex:1;margin-bottom:0">
          </div>
          <div class="flex" style="gap:6px">
            <input type="number" id="es-${it.id}" placeholder="বিক্রয় ৳${it.salePrice}" value="${it.salePrice}" style="flex:1;margin-bottom:0">
            <button class="btn btn-blue btn-sm" onclick="updateStockInfo(${it.id})">সেভ</button>
          </div>
        </div>
        <button class="btn btn-red btn-sm mt" style="width:100%" onclick="delStock(${it.id})">ডিলিট</button>
      </div>`;
    }
    h+=`</div>`;
  });
  return h;
}

    </div>`;
  }
  // search
  if(customers.length>0){
    h+=`<input placeholder="🔍 নাম বা মোবাইল দিয়ে খুঁজুন" value="${custSearch}" oninput="doSearch(this.value)" style="margin-top:10px">`;
  }
  h+=`<div id="custList">${renderCustomerList()}</div>`;
  return h;
}

function renderOneCustomer(cu){
    cu=migrateCustomer(cu);
    const t=custTotals(cu);

    h+=`</div>`;
  return h;
}

function renderCustomerList(){
  let list=customers.slice();
  if(custSearch.trim()){ const q=custSearch.toLowerCase(); list=list.filter(c=>c.name.toLowerCase().includes(q)||(c.mobile||'').includes(q)); }
  if(list.length===0) return `<p class="center gray sm" style="padding:24px">কোনো কাস্টমার নেই</p>`;
  // শেষ লেনদেনের তারিখ অনুযায়ী নতুন-আগে সাজাই, তারপর দিন ধরে গ্রুপ করি
  list.sort((a,b)=>custLastTS(b)-custLastTS(a));
  const groups={}; const order=[];
  list.forEach(cu=>{ const k=dateGroupKey(custLastTS(cu)); if(!groups[k]){ groups[k]=[]; order.push(k); } groups[k].push(cu); });
  let h='';
  order.forEach(k=>{
    const arr=groups[k];
    const label=dateGroupLabel(custLastTS(arr[0]));
    h+=`<div style="margin:12px 0 6px;padding:6px 10px;background:#eef2ff;border-radius:6px;font-weight:700;font-size:13px;color:#4338ca">📅 ${label} <span style="font-weight:400;color:#6b7280">(${arr.length} জন)</span></div>`;
    arr.forEach(cu=>{ h+=renderOneCustomer(cu); });
  });
  return h;
}

function renderDue(){
  // শুধু বাকি আছে এমন কাস্টমার
  const dueCustomers=customers.filter(c=>custNetDue(c)>0);
  const totalDue=dueCustomers.reduce((s,c)=>s+custNetDue(c),0);
  let h='';
  h+='<div class="box box-yellow"><div class="between bold"><span>মোট বকেয়া ('+dueCustomers.length+' জন):</span><span class="red" style="font-size:18px">৳'+bn(totalDue)+'</span></div></div>';

  if(dueCustomers.length===0){ h+='<p class="center green sm" style="padding:24px">🎉 কোনো বকেয়া নেই, সব পরিশোধ!</p>'; return h; }

  // সার্চ
  h+='<input id="dueSearchInput" placeholder="🔍 নাম বা মোবাইল দিয়ে খুঁজুন" value="'+dueSearch+'" oninput="doDueSearch(this.value)">';
  h+='<div id="dueList">'+renderDueList()+'</div>';
  return h;
}
function renderDueList(){
  const dueCustomers=customers.filter(c=>custNetDue(c)>0);
  let list=dueCustomers.slice();
  if(dueSearch.trim()){ const q=dueSearch.toLowerCase(); list=list.filter(c=>c.name.toLowerCase().includes(q)||(c.mobile||'').includes(q)); }
  list.sort((a,b)=>custNetDue(b)-custNetDue(a));
  let h='';
  list.forEach(cu=>{
    const bal=custNetDue(cu);
    const tag='<span class="tag tag-red">বাকি</span>';
    const inactiveDays=daysSince(custLastTS(cu));
    const inactiveTag=inactiveDays>=custLimit(cu)?' <span class="tag" style="background:#fdecea;color:#c2382e">⏰ '+inactiveDays+' দিন খোঁজ নেই</span>':'';
    h+='<div class="item"><div class="item-head" onclick="toggleCustomer('+cu.id+')">'
      +'<div style="flex:1"><div class="bold sm">'+cu.name+' '+creditBadge(cu)+' '+tag+inactiveTag+'</div>'
      +'<div class="xs gray">📱 '+cu.mobile+(cu.address?' | 📍 '+cu.address:'')+'</div>'
      +'<div class="xs gray">📅 শেষ লেনদেন: '+dateGroupLabel(custLastTS(cu))+'</div>'
      +'<div class="flex xs mt"><span class="blue">মোট: ৳'+bn(custTotals(cu).totalSale)+'</span><span class="green">জমা: ৳'+bn(custTotals(cu).totalPaid)+'</span><span class="red bold">বাকি: ৳'+bn(bal)+'</span></div></div>'
      +'<div style="display:flex;flex-direction:column;align-items:center;gap:6px">'
      +'<button onclick="event.stopPropagation();callCustomer(\''+cu.mobile+'\')" style="background:var(--green);color:#fff;border:none;border-radius:50%;width:36px;height:36px;font-size:16px;cursor:pointer">📞</button>'
      +'<span>'+(expandedCustomer===cu.id?'▲':'▼')+'</span></div></div>';
    if(expandedCustomer===cu.id){
      h+='<div class="item-body">';
      h+='<div class="box box-yellow xs">'
        +'<div class="flex"><input type="number" placeholder="জমা টাকা" id="pay-'+cu.id+'" style="flex:1;margin-bottom:0"><button class="btn btn-green btn-sm" onclick="addCustomerPayment('+cu.id+')">জমা নিন</button></div>'
        +'</div>';
      h+='<div class="flex mt" style="gap:6px">'
        +'<button class="btn btn-green btn-sm" style="flex:1" onclick="shareReceipt('+cu.id+')">📲 শেয়ার</button>'
        +'<button class="btn btn-orange btn-sm" style="flex:1" onclick="printReceipt('+cu.id+')">🖨️ প্রিন্ট</button>'
        +'</div>';
      h+='</div>';
    }
    h+='</div>';
  });
  return h;
}
function doDueSearch(v){ dueSearch=v; const el=document.getElementById('dueList'); if(el) el.innerHTML=renderDueList(); }

  const totalDebt=suppliers.reduce((s,sp)=>s+(sp.totalAmount-sp.totalPaid),0);
  h+=`<div class="box box-yellow"><div class="between bold"><span>মোট দেনা (আমি দিবো):</span><span class="orange">৳${bn(totalDebt)}</span></div></div>`;
  if(suppliers.length===0) h+=`<p class="center gray sm" style="padding:24px">কোনো সাপ্লায়ার নেই</p>`;
  else suppliers.slice().reverse().forEach(sp=>{
    const bal=sp.totalAmount-sp.totalPaid;
    h+=`<div class="item"><div class="item-head" onclick="toggleSupplier(${sp.id})">
      <div style="flex:1"><div class="bold sm">${sp.name} ${bal>0?'<span class="tag tag-red">দেনা</span>':'<span class="tag tag-green">পরিশোধ</span>'}</div>
      ${sp.mobile?'<div class="xs gray">📱 '+sp.mobile+'</div>':''}
      <div class="flex xs mt"><span class="blue">মোট: ৳${bn(sp.totalAmount)}</span><span class="${bal>0?'orange bold':'green'}">বাকি: ৳${bn(bal)}</span></div></div>
      <span>${expandedSupplier===sp.id?'▲':'▼'}</span></div>`;
    if(expandedSupplier===sp.id){
      h+=`<div class="item-body">`;
      // কেনাকাটার ইতিহাস (প্রথম এন্ট্রি + পরে যোগ করা সবগুলো)
      const purchases=sp.purchases||[{desc:sp.desc,amount:sp.totalAmount,date:sp.date}];
      h+=`<div class="bold xs mb">📦 মালের হিসাব:</div><div style="background:#fdf6e3;border-radius:6px;padding:8px" class="xs">`;
      purchases.forEach(pu=>{ h+=`<div class="between" style="padding:2px 0"><span class="gray">${pu.date}${pu.desc?' • '+pu.desc:''}</span><b>৳${bn(pu.amount)}</b></div>`; });
      h+=`</div>`;
      if(sp.payments&&sp.payments.length){ h+=`<div class="bold xs mt mb">💰 পরিশোধের হিসাব:</div><div style="background:#f0fdf4;border-radius:6px;padding:8px" class="xs">`; sp.payments.forEach(p=>{ h+=`<div class="between"><span class="gray">${p.date}</span><span class="green bold">৳${bn(p.amount)}</span></div>`; }); h+=`</div>`; }
      h+=`<div class="box box-yellow xs">
        <div class="between"><span>মোট দেনা:</span><b>৳${bn(sp.totalAmount)}</b></div>
        <div class="between"><span>পরিশোধ:</span><b>৳${bn(sp.totalPaid)}</b></div>
        <div class="between bold" style="border-top:1px solid #fde047;padding-top:4px;margin-top:4px"><span>বাকি:</span><b class="${bal>0?'orange':'green'}">৳${bn(bal)}</b></div>
        <div class="flex mt"><input type="number" placeholder="পরিশোধ টাকা" id="sppay-${sp.id}" style="flex:1;margin-bottom:0"><button class="btn btn-orange btn-sm" onclick="addSupplierPayment(${sp.id})">পরিশোধ</button></div>
      </div>
      <div class="box box-orange xs">
        <div class="bold orange mb">➕ নতুন মাল/দেনা যোগ করুন</div>
        <p class="xs gray mb">আবার মাল নিলে এখানে টাকার পরিমাণ যোগ করুন</p>
        <input placeholder="মালের বিবরণ (যেমন: ৩০ বস্তা ভুট্টা)" id="spduedesc-${sp.id}" style="margin-bottom:6px">
        <div class="flex"><input type="number" placeholder="টাকার পরিমাণ" id="spdue-${sp.id}" style="flex:1;margin-bottom:0"><button class="btn btn-orange btn-sm" onclick="addSupplierDue(${sp.id})">যোগ করুন</button></div>
      </div>
      <button class="btn btn-red btn-sm mt" style="width:100%" onclick="delSupplier(${sp.id})">ডিলিট</button></div>`;
    }
    h+=`</div>`;
  });
  return h;
}

function toggleMonth(k){ expandedMonth = expandedMonth===k ? null : k; render(); }
function toggleTopMonth(k){ expandedTopMonth = expandedTopMonth===k ? null : k; render(); }
function toggleTimeline(id){ expandedTimeline = expandedTimeline===id.toString() ? null : id.toString(); render(); }
// মাসভিত্তিক সেরা বিক্রিত মালের রিপোর্ট টেক্সট আকারে ডাউনলোড
// সব সময়ের বিক্রয় রিপোর্ট টেক্সট আকারে ডাউনলোড
function exportAllTimeSalesReport(){
  const report=itemSalesReport();
  let t='🌾 NGF AGRO\\n';
  t+='সব সময়ের বিক্রয় রিপোর্ট (মাল অনুযায়ী)\\n';
  t+='তারিখ: '+now()+'\\n';
  t+='===============================\\n\\n';
  if(report.length===0) t+='এখনো কোনো বিক্রয় নেই\\n';
  else report.forEach((r,i)=>{
    t+=(i+1)+'. '+r.name+'\\n';
    t+='   বস্তা: '+r.bags+' | ওজন: '+bn(r.kg)+' কেজি\\n';
    t+='   বিক্রয়: ৳'+bn(r.taka)+' | লাভ: ৳'+bn(r.profit)+'\\n\\n';
  });
  t+='===============================\\n   NGF AGRO\\n';
  dl(t,'NGF_AGRO_সবসময়ের_বিক্রয়_রিপোর্ট_'+new Date().toISOString().slice(0,10)+'.txt','text/plain');
}
function exportMonthlyTopSelling(){
  const monthly=monthlyTopSelling();
  let t='🌾 NGF AGRO\n';
  t+='মাসভিত্তিক সেরা বিক্রিত মালের রিপোর্ট\n';
  t+='তারিখ: '+now()+'\n';
  t+='===============================\n';
  if(monthly.length===0) t+='\nএখনো কোনো বিক্রয় নেই\n';
  monthly.forEach(mo=>{
    t+='\n■ '+mo.label+'\n';
    t+='-------------------------------\n';
    mo.items.forEach((r,i)=>{
      t+=(i+1)+'. '+r.name+': '+bn(r.kg)+' কেজি ('+r.bags+' বস্তা, ৳'+bn(r.taka)+')\n';
    });
  });
  t+='\n===============================\n   NGF AGRO\n';
  dl(t,'NGF_AGRO_মাসিক_মাল_রিপোর্ট_'+new Date().toISOString().slice(0,10)+'.txt','text/plain');
}
function renderMore(){
  let h='';
  // মালিকের উত্তোলন
  const totalWd=withdrawals.reduce((s,w)=>s+w.amount,0);
  const totalProfitAll=customers.reduce((s,c)=>s+custTotals(c).totalProfit,0);
  h+=`<div class="box box-orange"><div class="bold orange mb">💼 মালিকের উত্তোলন (লাভ থেকে টাকা নেওয়া)</div>
    <div class="between sm"><span>মোট লাভ:</span><b class="green">৳${bn(totalProfitAll)}</b></div>
    <div class="between sm"><span>মোট উত্তোলন:</span><b class="orange">৳${bn(totalWd)}</b></div>
    <div class="between sm bold" style="border-top:1px dashed #f3e0bd;padding-top:4px;margin-top:4px"><span>হাতে থাকা লাভ:</span><b class="green">৳${bn(totalProfitAll-totalWd)}</b></div>
    <input id="wdNote" placeholder="কী জন্য নিলেন (ঐচ্ছিক)" style="margin-top:8px">
    <div class="flex"><input id="wdAmount" type="number" placeholder="টাকার পরিমাণ" style="flex:1;margin-bottom:0"><button class="btn btn-orange btn-sm" onclick="addWithdrawal()">তুলুন</button></div>`;
  if(withdrawals.length>0){
    h+=`<div class="bold xs mt mb">উত্তোলনের হিস্টরি:</div><div style="background:#fff;border-radius:8px;padding:8px;max-height:160px;overflow-y:auto" class="xs">`;
    withdrawals.slice().reverse().forEach(w=>{
      h+=`<div class="between" style="border-bottom:1px solid #f0f0f0;padding:3px 0"><span class="gray">${w.date}${w.note?' • '+w.note:''}</span><span><b class="orange">৳${bn(w.amount)}</b> <span onclick="delWithdrawal(${w.id})" style="color:#c2382e;cursor:pointer">✕</span></span></div>`;
    });
    h+=`</div>`;
  }
  h+=`</div>`;
  // খোঁজ-সতর্কতার দিন সেটিং
  h+=`<div class="box box-blue"><div class="bold blue mb">⏰ খোঁজ-সতর্কতার সেটিং</div>
    <p class="xs gray mb">সবার জন্য ডিফল্ট: কত দিন লেনদেন না হলে সতর্ক করবে? (এখন: ${inactiveDaysLimit} দিন)। চাইলে প্রতিটা কাস্টমারের ভেতরে আলাদা দিনও সেট করা যায়।</p>
    <div class="flex"><input id="inactiveDaysInput" type="number" placeholder="দিন সংখ্যা (যেমন ১৫)" value="${inactiveDaysLimit}" style="flex:1;margin-bottom:0"><button class="btn btn-blue btn-sm" onclick="setInactiveDays()">সেট করুন</button></div>
  </div>`;
  // মাল-মেলানো সেটিং
  const aliases=getItemAliases();
  const rawNames=allRawItemNames();
  h+=`<div class="box box-orange">
    <div class="bold orange mb">🔗 মাল মেলানো (ভিন্ন বানান একই মাল হিসেবে গণনা)</div>
    <p class="xs gray mb">যেমন "মিক্স ভুষি" ও "মিকচার ভুষি" যদি আসলে একই মাল হয়, এখানে দুটোকে এক নামে মিলিয়ে দিন। রিপোর্ট ও র‍্যাঙ্কিং এ এক হয়ে যাবে (স্টক তালিকায় বদলাবে না)।</p>
    <input id="aliasFrom" placeholder="এই নামটা (যেমন: মিকচার ভুষি)" style="margin-bottom:6px">
    <div class="flex"><input id="aliasTo" placeholder="এই নামে গণনা হবে (যেমন: মিক্সার ভুষি)" style="flex:1;margin-bottom:0"><button class="btn btn-orange btn-sm" onclick="addItemAlias()">মেলান</button></div>`;
  if(rawNames.length>0){
    h+=`<div class="xs gray mt mb">আপনার বিক্রি করা মালের নামগুলো (কপি করে উপরে ব্যবহার করুন):</div><div style="background:#fff;border-radius:6px;padding:8px;max-height:100px;overflow-y:auto" class="xs gray">${rawNames.join(' • ')}</div>`;
  }
  if(Object.keys(aliases).length>0){
    h+=`<div class="bold xs mt mb">বর্তমান মেলানো তালিকা:</div><div style="background:#fff;border-radius:8px;padding:8px" class="xs">`;
    Object.entries(aliases).forEach(([from,to])=>{
      h+=`<div class="between" style="border-bottom:1px solid #f0f0f0;padding:4px 0"><span>${from} → <b>${to}</b></span><span onclick="delItemAlias('${from}')" style="color:#b5432f;cursor:pointer">✕</span></div>`;
    });
    h+=`</div>`;
  }
  h+=`</div>`;
  h+=`<div class="box box-green"><div class="bold mb">💾 ব্যাকআপ নিন</div>
    <p class="xs gray mb">নিয়মিত ব্যাকআপ রাখুন। ফোন বদলালে বা সমস্যা হলে ফিরিয়ে আনতে পারবেন।</p>
    <button class="btn btn-blue mb" onclick="exportTXT()">📄 রিপোর্ট ডাউনলোড (পড়ার জন্য)</button>
    <button class="btn btn-green" onclick="exportJSON()">💾 ফুল ব্যাকআপ (ফেরানোর জন্য)</button>
  </div>`;
  h+=`<div class="box box-blue"><div class="bold mb">♻️ ডাটা ফিরিয়ে আনুন</div>
    <p class="xs gray mb">আগের ব্যাকআপ ফাইল (.json) সিলেক্ট করুন।</p>
    <label class="upload">📁 ব্যাকআপ ফাইল নির্বাচন করুন<input type="file" accept=".json" onchange="importJSON(event)"></label>
  </div>`;
  h+=`<div class="box box-orange"><div class="bold mb">📊 মোট তথ্য</div>
    <div class="between sm"><span>মোট কাস্টমার:</span><b>${customers.length} জন</b></div>
    <div class="between sm"><span>মোট সাপ্লায়ার:</span><b>${suppliers.length} জন</b></div>
    <div class="between sm"><span>স্টকে মাল:</span><b>${stock.length} ধরনের</b></div>
  </div>`;
  h+=`<p class="note">NGF AGRO • আপনার ব্যবসার সঙ্গী</p>`;
  return h;
}

// পুরনো কাস্টমার নতুন কাঠামোয় + একই মোবাইলের ডুপ্লিকেট এক করা
(function migrateAll(){
  if(customers.length){
    // শুধু কাঠামো নতুন করি (পুরনো→নতুন), অটো-মার্জ করি না (আলাদা লোক মেশার ঝুঁকি এড়াতে)
    customers=customers.map(c=>migrateCustomer(c));
    save();
  }
})();
switchTab('dashboard');
</script>
